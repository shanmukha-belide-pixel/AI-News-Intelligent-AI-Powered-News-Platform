version: "3.9"

# =============================================================================
# AI News Platform — Full Docker Compose Stack
# =============================================================================

services:
  # ── C++20 Drogon Backend ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: news_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Server
      SERVER_PORT: 8080
      SERVER_THREADS: 8
      LOG_LEVEL: info
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ai_news
      DB_USER: news_user
      DB_PASSWORD: ${DB_PASSWORD:-news_secret_2026}
      DB_POOL_SIZE: 10
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
      # Kafka
      KAFKA_BROKERS: kafka:29092
      # Elasticsearch
      ES_URL: http://elasticsearch:9200
      ES_USER: elastic
      ES_PASSWORD: ${ES_PASSWORD:-elastic_secret}
      # MinIO
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      # JWT & AI
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: gpt-4o
      NEWSAPI_KEY: ${NEWSAPI_KEY}
      GUARDIAN_API_KEY: ${GUARDIAN_API_KEY}
      GNEWS_API_KEY: ${GNEWS_API_KEY}
      NYT_API_KEY: ${NYT_API_KEY}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - news_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: news_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ai_news
      POSTGRES_USER: news_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-news_secret_2026}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ../database/indexes.sql:/docker-entrypoint-initdb.d/02_indexes.sql:ro
      - ../database/stored_procedures.sql:/docker-entrypoint-initdb.d/03_procedures.sql:ro
      - ../database/triggers.sql:/docker-entrypoint-initdb.d/04_triggers.sql:ro
      - ../database/partitioning.sql:/docker-entrypoint-initdb.d/05_partitioning.sql:ro
    networks:
      - news_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U news_user -d ai_news"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c effective_cache_size=1GB
        -c work_mem=16MB
        -c checkpoint_completion_target=0.9
        -c log_min_duration_statement=500

  # ── Redis 7.2 ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: news_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD:-redis_secret}
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --save 900 1
        --save 300 10
    volumes:
      - redis_data:/data
    networks:
      - news_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Elasticsearch 8.12 ───────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: news_elasticsearch
    restart: unless-stopped
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - ELASTIC_PASSWORD=${ES_PASSWORD:-elastic_secret}
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx1g"
      - cluster.name=news-cluster
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - news_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10

  # ── Kibana (Elasticsearch dashboard) ─────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.2
    container_name: news_kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - news_net
    profiles:
      - monitoring

  # ── Apache Kafka ──────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: news_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zk_data:/var/lib/zookeeper/data
    networks:
      - news_net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: news_kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_data:/var/lib/kafka/data
    depends_on:
      - zookeeper
    networks:
      - news_net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── ClickHouse Analytics ──────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: news_clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"   # HTTP
      - "9000:9000"   # Native
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - news_net
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    profiles:
      - analytics

  # ── MinIO Object Storage ───────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: news_minio
    restart: unless-stopped
    ports:
      - "9001:9000"   # API
      - "9002:9001"   # Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - news_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Nginx Reverse Proxy + SSL termination ─────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: news_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - news_net
    profiles:
      - production

# =============================================================================
# Named Volumes
# =============================================================================
volumes:
  postgres_data:
  redis_data:
  es_data:
  kafka_data:
  zk_data:
  clickhouse_data:
  minio_data:

# =============================================================================
# Network
# =============================================================================
networks:
  news_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
