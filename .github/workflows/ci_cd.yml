name: AI News Platform
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/news-backend

jobs:
  # ── Job 1: Build & Test C++ Backend ────────────────────────────────────────
  backend-build-test:
    name: C++ Backend Build & Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            build-essential cmake git pkg-config \
            libssl-dev libboost-all-dev libjsoncpp-dev \
            uuid-dev zlib1g-dev libpq-dev libhiredis-dev \
            libcurl4-openssl-dev librdkafka-dev \
            libgtest-dev

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: backend/build
          key: ${{ runner.os }}-cmake-${{ hashFiles('backend/CMakeLists.txt') }}

      - name: Install Drogon
        run: |
          git clone --depth 1 --recurse-submodules \
            https://github.com/drogonframework/drogon /tmp/drogon
          cmake -S /tmp/drogon -B /tmp/drogon/build \
            -DCMAKE_BUILD_TYPE=Release -DBUILD_CTL=OFF \
            -DBUILD_EXAMPLES=OFF -DBUILD_TESTING=OFF
          cmake --build /tmp/drogon/build -j$(nproc)
          sudo cmake --install /tmp/drogon/build

      - name: Install jwt-cpp & spdlog
        run: |
          git clone --depth 1 https://github.com/Thalhammer/jwt-cpp /tmp/jwt-cpp
          sudo cp -r /tmp/jwt-cpp/include/jwt-cpp /usr/local/include/
          git clone --depth 1 https://github.com/gabime/spdlog /tmp/spdlog
          cmake -S /tmp/spdlog -B /tmp/spdlog/build -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/spdlog/build -j$(nproc)
          sudo cmake --install /tmp/spdlog/build

      - name: Configure CMake
        run: cmake -S backend -B backend/build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build backend/build -j$(nproc)

      - name: Run unit tests
        run: cd backend/build && ctest --output-on-failure -j4

  # ── Job 2: Database schema validation ──────────────────────────────────────
  db-validate:
    name: PostgreSQL Schema Validation
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ai_news_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      - name: Apply schema
        env:
          PGPASSWORD: test_pass
        run: |
          psql -h localhost -U test_user -d ai_news_test \
            -f database/schema.sql
          psql -h localhost -U test_user -d ai_news_test \
            -f database/indexes.sql
          psql -h localhost -U test_user -d ai_news_test \
            -f database/stored_procedures.sql
          psql -h localhost -U test_user -d ai_news_test \
            -f database/triggers.sql
          echo "Schema applied successfully ✓"

  # ── Job 3: Flutter build ───────────────────────────────────────────────────
  flutter-build:
    name: Flutter Android & iOS Build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable

      - name: Get dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Analyze
        working-directory: flutter_app
        run: flutter analyze

      - name: Run tests
        working-directory: flutter_app
        run: flutter test

      - name: Build APK
        working-directory: flutter_app
        run: flutter build apk --release --dart-define=API_BASE_URL=https://api.ainews.app

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk

  # ── Job 4: Docker build & push ─────────────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-24.04
    needs: [backend-build-test, db-validate]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}
            latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 5: Deploy to Kubernetes ────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-24.04
    needs: docker-build-push
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.30.0'

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig.yml

      - name: Deploy to cluster
        env:
          KUBECONFIG: kubeconfig.yml
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          # Update image tag in deployment
          sed -i "s|IMAGE_TAG|$IMAGE_TAG|g" backend/k8s/deployment.yml
          kubectl apply -f backend/k8s/
          kubectl rollout status deployment/news-backend -n news-platform --timeout=300s

      - name: Health check
        env:
          KUBECONFIG: kubeconfig.yml
        run: |
          kubectl get pods -n news-platform
          echo "Deployment complete ✓"
