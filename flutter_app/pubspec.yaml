name: ai_news_platform
description: AI-powered news platform — International, National & State news, Sports & Weather

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ─────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Navigation ────────────────────────────────────────────────────────────
  go_router: ^14.2.0

  # ── Networking ────────────────────────────────────────────────────────────
  dio: ^5.4.3
  web_socket_channel: ^3.0.1
  connectivity_plus: ^6.0.3

  # ── Auth ──────────────────────────────────────────────────────────────────
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.1
  flutter_secure_storage: ^9.0.0

  # ── Local Storage ─────────────────────────────────────────────────────────
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # ── UI ────────────────────────────────────────────────────────────────────
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  animations: ^2.0.11
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  glassmorphism: ^3.0.0
  smooth_page_indicator: ^1.2.0+3
  flutter_staggered_grid_view: ^0.7.0
  pull_to_refresh_flutter3: ^2.0.1
  infinite_scroll_pagination: ^4.0.0

  # ── Audio ─────────────────────────────────────────────────────────────────
  just_audio: ^0.9.40
  just_audio_background: ^0.0.1-beta.12
  audio_service: ^0.18.15

  # ── Search ────────────────────────────────────────────────────────────────
  speech_to_text: ^6.6.2

  # ── Notifications ─────────────────────────────────────────────────────────
  firebase_messaging: ^15.0.4
  flutter_local_notifications: ^17.2.2
  firebase_core: ^3.3.0

  # ── Location (for weather) ────────────────────────────────────────────────
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # ── Sharing ───────────────────────────────────────────────────────────────
  share_plus: ^10.0.0
  url_launcher: ^6.3.0

  # ── Video / Images ────────────────────────────────────────────────────────
  flutter_svg: ^2.0.10+1
  photo_view: ^0.15.0

  # ── Haptic ────────────────────────────────────────────────────────────────
  haptic_feedback: ^0.1.2

  # ── Utilities ─────────────────────────────────────────────────────────────
  intl: ^0.19.0
  timeago: ^3.6.1
  uuid: ^4.4.2
  equatable: ^2.0.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf   weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf weight: 600
        - asset: assets/fonts/Inter-Bold.ttf     weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf weight: 800

    - family: Merriweather
      fonts:
        - asset: assets/fonts/Merriweather-Regular.ttf
        - asset: assets/fonts/Merriweather-Bold.ttf    weight: 700
